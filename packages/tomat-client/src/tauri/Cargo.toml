[package]
name = "tomat"
version = "0.1.0"
description = "A local-first modular AI client"
authors = ["rzkyif"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "tomat_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["macos-private-api", "tray-icon"] }
tauri-plugin-opener = "2"
# Runtime OS detection so the UI bootstrap can pick the desktop vs mobile
# Platform impl (lib/platform/select.ts). Builds on every target.
tauri-plugin-os = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri-plugin-fs = "2.5.1"
tokio = { version = "1", features = ["rt-multi-thread", "fs", "sync", "time", "macros"] }
tauri-plugin-dialog = "2.7.1"
image = "0.25"
base64 = "0.22"
keyring-core = "1"
thiserror = "2"
# Per-process CPU / memory for the Services field's "Main Application" row.
sysinfo = "0.39"
# Pinned core networking (see commands/net.rs). reqwest + tokio-tungstenite both
# terminate TLS with a custom rustls verifier on the cert SPKI pin.
reqwest = { version = "0.13", default-features = false, features = ["rustls", "stream"] }
rustls = "0.23"
tokio-tungstenite = { version = "0.29", features = ["rustls-tls-webpki-roots"] }
futures-util = "0.3"
x509-parser = "0.18"
sha2 = "0.11"
# Logging: `log` facade + fern sinks (stdout + size-capped file), with `regex`
# for secret scrubbing and `chrono` for ISO-8601 file timestamps. See logging.rs.
log = "0.4"
fern = "0.7"
regex = "1"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
file-rotate = "0.8"

[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dependencies]
apple-native-keyring-store = { version = "1", features = ["keychain"] }

[target.'cfg(target_os = "windows")'.dependencies]
windows-native-keyring-store = "1"

[target.'cfg(any(target_os = "linux", target_os = "freebsd", target_os = "openbsd"))'.dependencies]
dbus-secret-service-keyring-store = { version = "1", features = ["crypto-rust"] }

# Desktop-only plugins and native crates. The updater plugin has no Android
# support (mobile self-updates via a hosted APK + install intent), autostart and
# global-shortcut are desktop concepts, and xcap / cpvc / font-kit / anytomd /
# pdf-extract back desktop-only features (screen capture, volume ducking, font
# enumeration, file-to-markdown conversion) that the mobile impl stubs out.
[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
# LAN core discovery: enumerate this machine's IPv4 interface addresses so the
# pairing sweep knows which /24 to probe (see commands/net.rs discover_lan_cores).
local-ip-address = "0.6"
tauri-plugin-global-shortcut = "2"
tauri-plugin-updater = "2"
tauri-plugin-autostart = "2"
tauri-plugin-process = "2"
anytomd = "1.3.0"
pdf-extract = "0.12.0"
xcap = "0.9.6"
cpvc = "0.6"
font-kit = "0.14"

[dev-dependencies]
tempfile = "=3.27.0"
rcgen = "=0.14.8"

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
todo = "warn"
dbg_macro = "warn"

