<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Canonical tomat app-icon master: a neutral grey plate (the brand's neutral
  base, matching the bg-surface family) with the white tomat ring centred on
  top and padded, so the grey shows both around the ring and through its centre
  hole. Full-bleed rounded square: desktop platforms draw it as-is; Android/iOS
  mask it to their own shape. Rasterize to icon-master.png and feed it to
  `tauri icon` to regenerate every platform variant under this directory.
-->
