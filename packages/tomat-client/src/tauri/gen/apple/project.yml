name: tomat
options:
  bundleIdPrefix: au.tomat.ing
  deploymentTarget:
    iOS: 14.0
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  app:
    base:
      PRODUCT_NAME: tomat
      # Per-channel install identity, the iOS analogue of android's
      # applicationIdSuffix: stable is bare au.tomat.ing; dev/latest append the
      # suffix from the build-time xcconfig (TOMAT_BUNDLE_ID_SUFFIX) so they
      # install alongside stable. PRODUCT_NAME stays "tomat" (identifier-safe);
      # the on-device label comes from CFBundleDisplayName in the target info.
      PRODUCT_BUNDLE_IDENTIFIER: au.tomat.ing$(TOMAT_BUNDLE_ID_SUFFIX)
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  tomat_iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      - path: Externals
      - path: tomat_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: LaunchScreen.storyboard
    info:
      path: tomat_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        # Branded launch screen: LaunchScreen.storyboard centers the tomat ring
        # (LaunchLogo, DayNight imageset) on LaunchBackground (DayNight
        # #FAFAFA/#171717), matching the Android splash. A storyboard is used
        # rather than the UILaunchScreen Info.plist dict because the dict does not
        # resolve dark-appearance colors/images at launch.
        UILaunchStoryboardName: LaunchScreen
        # tomat records audio for voice input; iOS crashes the app on mic access
        # without this string. Keep in sync with tomat_iOS/Info.plist (the file
        # the build actually reads; this feeds `init`/xcodegen regeneration).
        NSMicrophoneUsageDescription: "tomat uses the microphone for voice input: push-to-talk and voice activity detection."
        # Pairing reaches a Core running on another device over the local network.
        NSLocalNetworkUsageDescription: tomat uses the local network to find and connect to a tomat Core running on another device.
        # Allow plaintext/self-signed traffic to a Core on the LAN or the dev
        # host (the iOS analogue of Android's usesCleartextTraffic). Scoped to
        # local networking, not arbitrary loads.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Version + build number come from the build-time xcconfig, which
        # scripts/build-ios.ts regenerates from tauri.conf.json on every build
        # (the iOS analogue of android's autogenerated tauri.properties), so the
        # iOS version never drifts from the Tauri config version.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # On-device app label. Stable reads "tomat"; dev/latest read "tomat (dev)"
        # / "tomat (latest)" via the xcconfig, matching the desktop naming.
        CFBundleDisplayName: $(TOMAT_DISPLAY_NAME)
    entitlements:
      path: tomat_iOS/tomat_iOS.entitlements
    # Per-build settings materialized by scripts/build-ios.ts before the build:
    # the version (synced from tauri.conf.json) plus the per-channel bundle-id
    # suffix and display name. Autogenerated + gitignored, like android's
    # tauri.properties.
    configFiles:
      debug: tauri-channel.xcconfig
      release: tauri-channel.xcconfig
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
      groups: [app]
    dependencies:
      - framework: libapp.a
        embed: false
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
    preBuildScripts:
      - script: deno task tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:?}" --header-search-paths "${HEADER_SEARCH_PATHS:?}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${FORCE_COLOR} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a
