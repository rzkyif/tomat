[package]
name = "tomat-core-speech"
version = "0.1.0"
edition = "2021"
description = "Resident HTTP speech sidecar for tomat-core: Whisper STT + Kokoro TTS via a statically-linked sherpa-onnx. Replaces the whisper-server sidecar and the kokoro-js TTS worker; ships as one self-contained binary, downloaded on demand alongside llama-server/deno."
publish = false

[dependencies]
# Pinned exact so the linked crate, the win-arm64 CPU lib staged in CI, and the
# prebuilt CUDA GPU archives (scripts/release/core.ts) all agree on one version.
# default-features off so the local static/shared features below select the link
# mode: static (CPU, self-contained) or shared (GPU, dynamic link against the
# staged prebuilt lib). Leaving the crate's own `static` default on would keep it
# enabled even under the shared build's --no-default-features.
sherpa-onnx = { version = "=1.13.3", default-features = false }
tiny_http = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"

# CPU builds link sherpa-onnx statically (default, self-contained); GPU builds use
# `--no-default-features --features shared` to link it dynamically against the
# staged prebuilt GPU lib (see buildSpeechVariant in scripts/release/core.ts).
[features]
default = ["static"]
static = ["sherpa-onnx/static"]
shared = ["sherpa-onnx/shared"]

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
todo = "warn"
dbg_macro = "warn"
