[package]
name = "tomat-core-ptyhost"
version = "0.1.0"
edition = "2021"
description = "PTY host helper for tomat-core. Spawns a Deno tool worker with stdin/stderr on a pseudo-terminal so Deno's interactive permission prompts fire, bridging the PTY and a control protocol over the helper's own stdio. The worker's stdout is inherited untouched, so the core<->worker NDJSON stream flows through directly."
publish = false

[dependencies]
base64 = "0.22"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[target.'cfg(unix)'.dependencies]
nix = { version = "0.29", features = ["fs", "process", "signal", "term"] }

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
todo = "warn"
dbg_macro = "warn"
