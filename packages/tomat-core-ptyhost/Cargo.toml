[package]
name = "tomat-core-ptyhost"
version = "0.1.0"
edition = "2021"
description = "PTY host helper for tomat-core. Spawns a Deno tool worker with stdin/stderr on a pseudo-terminal (a ConPTY on Windows) so Deno's interactive permission prompts fire, bridging the terminal and a control protocol over the helper's own stdio. On unix the worker's stdout is inherited untouched; on Windows the worker protocol rides a loopback socket, leaving the pseudoconsole for the prompt alone."
publish = false

[dependencies]
base64 = "0.22"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[target.'cfg(unix)'.dependencies]
nix = { version = "0.31", features = ["fs", "process", "signal", "term"] }

# Windows uses a ConPTY (pseudoconsole) instead of a unix PTY. portable-pty
# wraps CreatePseudoConsole + the STARTUPINFOEX spawn dance; since the worker
# protocol rides a loopback socket on Windows (not the child's stdout), the
# pseudoconsole only has to carry Deno's permission prompt, which is exactly
# what portable-pty's all-handles-on-console model provides.
[target.'cfg(windows)'.dependencies]
portable-pty = "0.9"

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
todo = "warn"
dbg_macro = "warn"
