# Category slug: feature-requests
# A matching Discussion category named "Feature Requests" must exist in the repo.
title: "[Feature] "
labels:
  - feature-request
body:
  - type: markdown
    attributes:
      value: |
        Use this form for a new capability that tomat does not have today. For a
        refinement to an existing feature, use Improvement Suggestions instead.
        Requests are prioritized by concrete use case. A well-described workflow
        is more persuasive than a vague wish.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the need, not the implementation. What can't you do today?
      placeholder: e.g. "I want to pipe the active transcription into a terminal command without switching windows."
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Concrete use-case
      description: Walk through a realistic scenario. Who, when, what, why.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: If you have a specific idea for how it should work, describe it. Otherwise leave blank and trust the maintainer to design.
  - type: textarea
    id: experiment
    attributes:
      label: Implementation notes (optional)
      description: |
        If you experimented with an implementation on a fork, share what you
        found: the approach you tried, what worked and what did not, trade-offs
        and edge cases, and links to the relevant code. Do not open a pull
        request. Findings let a maintainer reimplement the feature with full
        context. See CONTRIBUTING.md.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds
      description: Existing tools, manual workflows, or related tomat features you've tried.
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, prior art from other apps, relevant constraints.
