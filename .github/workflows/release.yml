name: Release

# Branch-driven channel release. Fast-forward main -> latest publishes the latest
# channel; fast-forward latest -> stable publishes stable. The channel is the
# branch name. Each native runner builds + build-time-signs its own triple
# (ci-build), then one coordinator composes + Ed25519-signs + uploads the unified
# manifests once to R2 and mirrors the run to the rolling per-channel GitHub
# Release (ci-publish). Both halves share the R2 release-state cursor with the
# local `deno task release`, so the two pipelines never double-publish.
#
# A cheap `preflight` job diffs the release items against that shared cursor and
# emits two gates: `changed` (any item differs -> run publish) and `native` (a
# matrix-built item - core / desktop client / android - differs -> run the
# expensive per-triple build matrix). The platform-independent items (extension,
# catalog, install scripts, schemas, the landing page) build on the publish
# coordinator, so a push touching only them - e.g. a website-only change - skips
# the whole build matrix: changed=true, native=false, build skipped, publish runs
# just the changed items. `deno task remote-release` moves the branch with nothing
# published yet, so preflight sees changes and CI does the needed work; `deno task
# release` publishes locally FIRST and then pushes the branch, so preflight sees
# the cursor already current and every job is skipped.
#
# A changed-but-unbumped item fails the publish job loudly. After a successful
# latest-channel publish, a final `bump` job advances the just-published items'
# version files and commits them to `main` ONLY (the committed counterpart to the
# local release's post-publish bump). `latest` is left at the released commit. Source
# hashes are version-blind, so this lone bump never re-triggers a release on its own:
# it sits on `main` and ships bundled with the next real source change on a later
# `main -> latest` promotion. Stable is a promotion of already-bumped versions, so
# its bump job is a no-op.
#
# Required repo secrets: TOMAT_SIGNING_PRIVATE_KEY_B64, TOMAT_SIGNING_PUBLIC_KEY_B64,
# TAURI_UPDATER_PUBLIC_KEY, TAURI_UPDATER_PRIVATE_KEY, TAURI_UPDATER_PRIVATE_KEY_PASSWORD,
# TOMAT_ANDROID_KEYSTORE_B64, TOMAT_ANDROID_KEYSTORE_PASSWORD, TOMAT_ANDROID_KEY_ALIAS,
# TOMAT_ANDROID_KEY_PASSWORD, CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN,
# TOMAT_R2_BUCKET, TOMAT_STORAGE_DOMAIN.

on:
  push:
    branches: [latest, stable]

# The GitHub Release mirror needs to create/edit releases + move the rolling tag.
permissions:
  contents: write

# Serialize per channel; never cancel a half-done publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Cheap gate: does this channel actually have anything to publish? Diffs each
  # release item against the shared R2 cursor (public read, no secrets but the
  # non-secret Ed25519 public key). When false, the build + publish jobs below are
  # skipped, so a local-release branch push does not re-run the whole matrix.
  preflight:
    name: "Preflight (changes?)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      changed: ${{ steps.plan.outputs.changed }}
      native: ${{ steps.plan.outputs.native }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Channel from branch
        id: ch
        shell: bash
        run: echo "channel=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.x

      - name: Plan against the R2 cursor
        id: plan
        env:
          TOMAT_SIGNING_PUBLIC_KEY_B64: ${{ secrets.TOMAT_SIGNING_PUBLIC_KEY_B64 }}
          TOMAT_STORAGE_DOMAIN: ${{ secrets.TOMAT_STORAGE_DOMAIN }}
        run: deno task release:ci-preflight --channel=${{ steps.ch.outputs.channel }}

  # One native runner per desktop triple. The Linux runner additionally builds the
  # Android APK(s). Each stages its artifacts + descriptors for the publish job.
  build:
    name: "Build (${{ matrix.id }})"
    needs: preflight
    # Only the matrix-built items (core / desktop client / android) need a build
    # runner. A push touching only platform-independent items (e.g. website-only)
    # has native=false, so the whole matrix is skipped and publish runs alone.
    if: needs.preflight.outputs.native == 'true'
    strategy:
      # All-or-nothing: a release should not publish a partial platform set. A
      # transient runner failure is recovered by re-pushing (the run is idempotent).
      fail-fast: true
      matrix:
        include:
          - { id: macos-x64, os: macos-15-intel }
          # The macOS arm64 runner additionally builds + uploads the iOS .ipa
          # (App Store Connect), the way the Linux runner additionally builds the
          # Android APK: additive on an existing runner so the host core + desktop
          # client are not built twice. iOS ships through the App Store, so it
          # uploads itself rather than staging for the publish coordinator. Inert
          # until the Apple account + APPLE_* secrets exist.
          - { id: macos-arm64, os: macos-14, ios: true }
          - { id: windows-x64, os: windows-latest }
          - { id: windows-arm64, os: windows-11-arm }
          - { id: linux-x64, os: ubuntu-latest, android: true }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Channel from branch
        id: ch
        shell: bash
        run: echo "channel=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.x

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.96.1
          # Android ABIs only on the Linux runner and iOS ABIs only on the macOS
          # arm64 runner; the desktop runners build their host triple natively (no
          # cross targets needed). iOS stays dormant until the IOS_ENABLED repo
          # variable is set (alongside the Apple account + secrets), so nothing
          # iOS runs in CI before then.
          targets: ${{ matrix.android && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || (matrix.ios && vars.IOS_ENABLED == 'true') && 'aarch64-apple-ios,aarch64-apple-ios-sim' || '' }}

      # JDK for the Gradle/Tauri Android build (Linux runner only).
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        if: matrix.android
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux deps for Tauri / xcap / cpal
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libpipewire-0.3-dev \
            libasound2-dev \
            libgbm-dev \
            libsecret-1-dev \
            patchelf

      # Single workspace rooted at the repo root: all six crates build into the
      # shared ./target, so cache that one dir. Pointing at member subdirs caches
      # only the registry (their target/ dirs do not exist), leaving the whole
      # dependency graph to recompile every run.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target
          shared-key: release-${{ matrix.id }}
          cache-all-crates: true

      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock', '**/deno.json', '**/deno.jsonc') }}
          restore-keys: |
            deno-${{ runner.os }}-

      # win-arm64 only: workerd (a website-only workspace dep) ships no arm64
      # Windows binary, and its npm lifecycle script aborts with "Unsupported
      # platform: win32 arm64". With nodeModulesDir "auto", deno runs allowScripts
      # lifecycle scripts while setting up the workspace node_modules, which the
      # very first `deno task release:ci-build` triggers - BEFORE build-client.ts
      # (its in-graph strip) can run. So drop workerd from allowScripts here,
      # before any deno command. deno.json is JSONC, so the trailing comma left on
      # the previous entry is fine. This checkout is ephemeral; nothing is committed.
      - name: Drop workerd from allowScripts (win-arm64)
        if: matrix.id == 'windows-arm64'
        shell: bash
        run: |
          grep -v 'npm:workerd@' deno.json > deno.json.tmp
          mv deno.json.tmp deno.json

      # sherpa-onnx-sys's prebuilt download map omits win-arm64, so stage the
      # upstream win-arm64 static lib and point SHERPA_ONNX_LIB_DIR at it (the CI
      # counterpart to windows-provision.ps1's guest setup). The version pin must
      # match sherpa-onnx in packages/tomat-core-speech/Cargo.toml.
      - name: Stage sherpa-onnx win-arm64 lib (win-arm64)
        if: matrix.id == 'windows-arm64'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $SherpaVersion = "1.13.3"
          $Name = "sherpa-onnx-v$SherpaVersion-win-arm64-static-MT-Release-lib"
          $Url = "https://github.com/k2-fsa/sherpa-onnx/releases/download/v$SherpaVersion/$Name.tar.bz2"
          $Root = Join-Path $env:RUNNER_TEMP "sherpa-onnx-libs"
          New-Item -ItemType Directory -Force -Path $Root | Out-Null
          $archive = Join-Path $Root "$Name.tar.bz2"
          Write-Host "downloading $Url"
          Invoke-WebRequest -Uri $Url -OutFile $archive
          & "$env:SystemRoot\System32\tar.exe" -xf $archive -C $Root
          $lib = Get-ChildItem -Recurse -Path $Root -Filter "sherpa-onnx-core.lib" | Select-Object -First 1
          if (-not $lib) { throw "sherpa-onnx-core.lib not found under $Root" }
          "SHERPA_ONNX_LIB_DIR=$($lib.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "SHERPA_ONNX_LIB_DIR = $($lib.DirectoryName)"

      # Stage the prebuilt CUDA sherpa-onnx lib so buildSpeech emits a `cuda`
      # speech variant for NVIDIA on Linux. No CUDA toolkit is installed: the
      # archive bundles the GPU onnxruntime + provider .so files, which link at
      # build time and load CUDA at runtime on the user's machine. Linux only:
      # the win-x64 CUDA archive omits onnxruntime.lib, so MSVC can't link the
      # shared build (see SPEECH_GPU_VARIANTS in scripts/release/core.ts). If the
      # lib isn't found this warns and skips, so the leg still ships CPU speech.
      # Version must match sherpa-onnx in packages/tomat-core-speech/Cargo.toml.
      - name: Stage sherpa-onnx CUDA lib (linux-x64)
        if: matrix.id == 'linux-x64'
        shell: bash
        run: |
          set -euo pipefail
          SHERPA_VERSION=1.13.3
          NAME="sherpa-onnx-v${SHERPA_VERSION}-cuda-12.x-cudnn-9.x-linux-x64-gpu"
          URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/v${SHERPA_VERSION}/${NAME}.tar.bz2"
          ROOT="${RUNNER_TEMP}/sherpa-onnx-cuda"
          mkdir -p "$ROOT"
          echo "downloading $URL"
          curl -fsSL "$URL" -o "$ROOT/${NAME}.tar.bz2"
          tar -xjf "$ROOT/${NAME}.tar.bz2" -C "$ROOT"
          FOUND=$(find "$ROOT" -name libsherpa-onnx-c-api.so -print -quit || true)
          if [ -z "$FOUND" ]; then
            echo "::warning::libsherpa-onnx-c-api.so not found; shipping CPU speech only"
          else
            echo "SHERPA_ONNX_GPU_LIB_DIR_CUDA=$(dirname "$FOUND")" >> "$GITHUB_ENV"
            echo "SHERPA_ONNX_GPU_LIB_DIR_CUDA = $(dirname "$FOUND")"
          fi

      # Native Core installer tooling (core-installers.ts): rpmbuild on Linux and
      # makensis on Windows. macOS pkgbuild/productsign/notarytool ship with Xcode
      # on the macOS runners. When a tool is missing the builder degrades to
      # skipping that installer, so these keep the double-click packages in the
      # release rather than being strictly required.
      - name: Install Core installer tooling (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      # winget is absent on the windows-11-arm runner, and even where present its
      # silent NSIS install does not add makensis to PATH (so core-installers.ts's
      # have("makensis") would skip the installer on windows-x64 too). Stage the
      # portable NSIS zip and put makensis on PATH so the check passes on both
      # windows-x64 and windows-arm64 (the x86 makensis runs under arm64
      # emulation). Best-effort: if staging fails, buildWindowsNsis logs
      # "makensis not available" and skips the Core installer, keeping the run green.
      # Version-independent of the sherpa pin; bump when a newer NSIS is desired.
      - name: Install Core installer tooling (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # GitHub-hosted NSIS: SourceForge's redirect mirrors fail intermittently
          # (this download flaked on x64 while succeeding on arm64). This is the same
          # distribution Tauri fetches for its own bundler. Its real makensis.exe is
          # in Bin/ with the support files (Stubs/Plugins/Contrib/Include) at the
          # archive root, so pick the real exe (largest, over the tiny root shim) and
          # point NSISDIR at the root so makensis resolves them regardless of cwd.
          $Url = "https://github.com/tauri-apps/binary-releases/releases/download/nsis-3.11/nsis-3.11.zip"
          $Root = Join-Path $env:RUNNER_TEMP "nsis"
          try {
            New-Item -ItemType Directory -Force -Path $Root | Out-Null
            $zip = Join-Path $Root "nsis.zip"
            Write-Host "downloading $Url"
            Invoke-WebRequest -Uri $Url -OutFile $zip -MaximumRetryCount 5 -RetryIntervalSec 5
            Expand-Archive -LiteralPath $zip -DestinationPath $Root -Force
            $makensis = Get-ChildItem -Recurse -Path $Root -Filter "makensis.exe" |
              Sort-Object Length -Descending | Select-Object -First 1
            if (-not $makensis) { throw "makensis.exe not found under $Root" }
            $nsisDir = $makensis.Directory.Parent.FullName
            Add-Content -Path $env:GITHUB_PATH -Value $makensis.DirectoryName
            Add-Content -Path $env:GITHUB_ENV -Value "NSISDIR=$nsisDir"
            Write-Host "makensis: $($makensis.FullName); NSISDIR=$nsisDir"
          } catch {
            Write-Host "::warning::NSIS staging failed ($($_.Exception.Message)); Core Windows installer will be skipped"
          }

      - name: Build + stage (${{ matrix.id }})
        shell: bash
        env:
          # Public key is baked into the core binary; the Tauri minisign key signs
          # the desktop bundle; the Android keystore signs the APK. The Ed25519
          # PRIVATE manifest key is deliberately NOT provided to build runners.
          TOMAT_SIGNING_PUBLIC_KEY_B64: ${{ secrets.TOMAT_SIGNING_PUBLIC_KEY_B64 }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_UPDATER_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_UPDATER_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY_PASSWORD }}
          TOMAT_ANDROID_KEYSTORE_B64: ${{ secrets.TOMAT_ANDROID_KEYSTORE_B64 }}
          TOMAT_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.TOMAT_ANDROID_KEYSTORE_PASSWORD }}
          TOMAT_ANDROID_KEY_ALIAS: ${{ secrets.TOMAT_ANDROID_KEY_ALIAS }}
          TOMAT_ANDROID_KEY_PASSWORD: ${{ secrets.TOMAT_ANDROID_KEY_PASSWORD }}
          # Apple signing + App Store Connect (macOS client signing and the iOS
          # .ipa build/upload). Empty until the account exists, so both stay inert.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          # Windows Authenticode code-signing, DORMANT until a cert exists. Empty
          # secrets => the client + Core NSIS installers ship unsigned and the
          # install flow keeps stripping Mark-of-the-Web (see injectWindowsSigning
          # in client.ts + signWindows in core-installers.ts).
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
          WINDOWS_SIGN_COMMAND: ${{ secrets.WINDOWS_SIGN_COMMAND }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          # NDK for the Tauri Android build (Linux runner only). The runner sets
          # ANDROID_NDK_LATEST_HOME in its shell env; surface it under the names
          # Tauri/Gradle read.
          if [ -n "${{ matrix.android }}" ]; then
            export NDK_HOME="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"
            export ANDROID_NDK_HOME="$NDK_HOME"
          fi
          deno task release:ci-build \
            --channel=${{ steps.ch.outputs.channel }} \
            ${{ matrix.android && '--android' || '' }} \
            ${{ (matrix.ios && vars.IOS_ENABLED == 'true') && '--ios' || '' }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: stage-${{ matrix.id }}
          path: stage
          retention-days: 3
          if-no-files-found: error

  # The single coordinator: collect every runner's stage dir, reconstruct dist/,
  # compose + sign + upload the unified manifests to R2, write the shared cursor,
  # and mirror the run to the rolling per-channel GitHub Release.
  publish:
    name: "Publish + GitHub Release"
    needs: [preflight, build]
    # Run whenever anything changed. `build` is skipped for a platform-independent
    # -only push (native=false); always() lets publish proceed past that skip, and
    # the result guard still stops it if a build runner actually failed.
    if: >-
      always() && needs.preflight.outputs.changed == 'true' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    # A healthy publish is ~5-7 min; cap well above that so a hung upload/verify
    # surfaces in minutes rather than after the old 30-min ceiling.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Channel from branch
        id: ch
        run: echo "channel=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.x

      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock', '**/deno.json', '**/deno.jsonc') }}
          restore-keys: |
            deno-${{ runner.os }}-

      # All build artifacts, each under staging/stage-<id>/.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: staging
          pattern: stage-*

      # The publish half reads R2 + signing creds from .env (loadOrSeedEnv). Only
      # single-line secrets land here; the multi-line Tauri key is build-only.
      # Secrets pass through env (masked in logs), not the script body.
      - name: Write .env from secrets
        env:
          TOMAT_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TOMAT_SIGNING_PRIVATE_KEY_B64 }}
          TOMAT_SIGNING_PUBLIC_KEY_B64: ${{ secrets.TOMAT_SIGNING_PUBLIC_KEY_B64 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TOMAT_R2_BUCKET: ${{ secrets.TOMAT_R2_BUCKET }}
          TOMAT_STORAGE_DOMAIN: ${{ secrets.TOMAT_STORAGE_DOMAIN }}
        run: |
          {
            echo "TOMAT_SIGNING_PRIVATE_KEY_B64=$TOMAT_SIGNING_PRIVATE_KEY_B64"
            echo "TOMAT_SIGNING_PUBLIC_KEY_B64=$TOMAT_SIGNING_PUBLIC_KEY_B64"
            echo "CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID"
            echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN"
            echo "TOMAT_R2_BUCKET=$TOMAT_R2_BUCKET"
            echo "TOMAT_STORAGE_DOMAIN=$TOMAT_STORAGE_DOMAIN"
          } > .env

      - name: Publish to R2 + GitHub Release
        env:
          # gh (the GitHub Release mirror) + the stable-channel upstream resolver.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          deno task release:ci-publish \
            --channel=${{ steps.ch.outputs.channel }} \
            --yes \
            --staging-root=staging

  # Post-publish bump: advance the just-published items' version files and commit
  # them to `main` ONLY (the committed counterpart to a local release's auto-bump).
  # It does not touch `latest` or the cursor: `latest` stays at the released commit
  # and the cursor keeps ci-publish's pre-bump hash, so nothing re-releases. The
  # bump publishes on the next `main -> latest` promotion. Latest channel only.
  # Pushes via GITHUB_TOKEN, which cannot trigger another workflow run.
  bump:
    name: "Bump versions on main"
    needs: [preflight, publish]
    if: needs.preflight.outputs.changed == 'true' && github.ref_name == 'latest'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Full history + write token so the bump can commit on main and move latest.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.x

      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock', '**/deno.json', '**/deno.jsonc') }}
          restore-keys: |
            deno-${{ runner.os }}-

      # Same .env the publish half uses: loadOrSeedEnv wants the R2 + signing keys
      # to read + write the shared release-state cursor.
      - name: Write .env from secrets
        env:
          TOMAT_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TOMAT_SIGNING_PRIVATE_KEY_B64 }}
          TOMAT_SIGNING_PUBLIC_KEY_B64: ${{ secrets.TOMAT_SIGNING_PUBLIC_KEY_B64 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TOMAT_R2_BUCKET: ${{ secrets.TOMAT_R2_BUCKET }}
          TOMAT_STORAGE_DOMAIN: ${{ secrets.TOMAT_STORAGE_DOMAIN }}
        run: |
          {
            echo "TOMAT_SIGNING_PRIVATE_KEY_B64=$TOMAT_SIGNING_PRIVATE_KEY_B64"
            echo "TOMAT_SIGNING_PUBLIC_KEY_B64=$TOMAT_SIGNING_PUBLIC_KEY_B64"
            echo "CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID"
            echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN"
            echo "TOMAT_R2_BUCKET=$TOMAT_R2_BUCKET"
            echo "TOMAT_STORAGE_DOMAIN=$TOMAT_STORAGE_DOMAIN"
          } > .env

      - name: Configure git identity
        run: |
          git config user.name "tomat-release[bot]"
          git config user.email "tomat-release[bot]@users.noreply.github.com"

      - name: Bump versions, commit to main
        run: deno task release:ci-bump --channel=${{ github.ref_name }}
