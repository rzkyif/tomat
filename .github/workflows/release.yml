name: Release

# Branch-driven channel release. Fast-forward main -> latest publishes the latest
# channel; fast-forward latest -> stable publishes stable. The channel is the
# branch name. Each native runner builds + build-time-signs its own triple
# (ci-build), then one coordinator composes + Ed25519-signs + uploads the unified
# manifests once to R2 and mirrors the run to the rolling per-channel GitHub
# Release (ci-publish). Both halves share the R2 release-state cursor with the
# local `deno task release`, so the two pipelines never double-publish.
#
# A cheap `preflight` job diffs the release items against that shared cursor and
# gates the build + publish jobs. `deno task remote-release` moves the branch with
# nothing published yet, so preflight sees changes and CI does the full build;
# `deno task release` publishes locally FIRST and then pushes the branch, so
# preflight sees the cursor already current and the expensive matrix is skipped.
#
# A changed-but-unbumped item fails the publish job loudly. After a successful
# latest-channel publish, a final `bump` job advances the just-published items'
# version files, commits them to `main`, and fast-forwards `latest` onto that
# commit (mirroring the local release's post-publish bump). Stable is a promotion
# of already-bumped versions, so its bump job is a no-op.
#
# Required repo secrets: TOMAT_SIGNING_PRIVATE_KEY_B64, TOMAT_SIGNING_PUBLIC_KEY_B64,
# TAURI_UPDATER_PUBLIC_KEY, TAURI_UPDATER_PRIVATE_KEY, TAURI_UPDATER_PRIVATE_KEY_PASSWORD,
# TOMAT_ANDROID_KEYSTORE_B64, TOMAT_ANDROID_KEYSTORE_PASSWORD, TOMAT_ANDROID_KEY_ALIAS,
# TOMAT_ANDROID_KEY_PASSWORD, CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN,
# TOMAT_R2_BUCKET, TOMAT_STORAGE_DOMAIN.

on:
  push:
    branches: [latest, stable]

# The GitHub Release mirror needs to create/edit releases + move the rolling tag.
permissions:
  contents: write

# Serialize per channel; never cancel a half-done publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Cheap gate: does this channel actually have anything to publish? Diffs each
  # release item against the shared R2 cursor (public read, no secrets but the
  # non-secret Ed25519 public key). When false, the build + publish jobs below are
  # skipped, so a local-release branch push does not re-run the whole matrix.
  preflight:
    name: "Preflight (changes?)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      changed: ${{ steps.plan.outputs.changed }}
    steps:
      - uses: actions/checkout@v6

      - name: Channel from branch
        id: ch
        shell: bash
        run: echo "channel=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.8.x

      - name: Plan against the R2 cursor
        id: plan
        env:
          TOMAT_SIGNING_PUBLIC_KEY_B64: ${{ secrets.TOMAT_SIGNING_PUBLIC_KEY_B64 }}
          TOMAT_STORAGE_DOMAIN: ${{ secrets.TOMAT_STORAGE_DOMAIN }}
        run: deno task release:ci-preflight --channel=${{ steps.ch.outputs.channel }}

  # One native runner per desktop triple. The Linux runner additionally builds the
  # Android APK(s). Each stages its artifacts + descriptors for the publish job.
  build:
    name: "Build (${{ matrix.id }})"
    needs: preflight
    if: needs.preflight.outputs.changed == 'true'
    strategy:
      # All-or-nothing: a release should not publish a partial platform set. A
      # transient runner failure is recovered by re-pushing (the run is idempotent).
      fail-fast: true
      matrix:
        include:
          - { id: macos-x64, os: macos-15-intel }
          # The macOS arm64 runner additionally builds + uploads the iOS .ipa
          # (App Store Connect), the way the Linux runner additionally builds the
          # Android APK: additive on an existing runner so the host core + desktop
          # client are not built twice. iOS ships through the App Store, so it
          # uploads itself rather than staging for the publish coordinator. Inert
          # until the Apple account + APPLE_* secrets exist.
          - { id: macos-arm64, os: macos-14, ios: true }
          - { id: windows-x64, os: windows-latest }
          - { id: windows-arm64, os: windows-11-arm }
          - { id: linux-x64, os: ubuntu-latest, android: true }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Channel from branch
        id: ch
        shell: bash
        run: echo "channel=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.8.x

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          # Android ABIs only on the Linux runner and iOS ABIs only on the macOS
          # arm64 runner; the desktop runners build their host triple natively (no
          # cross targets needed). iOS stays dormant until the IOS_ENABLED repo
          # variable is set (alongside the Apple account + secrets), so nothing
          # iOS runs in CI before then.
          targets: ${{ matrix.android && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || (matrix.ios && vars.IOS_ENABLED == 'true') && 'aarch64-apple-ios,aarch64-apple-ios-sim' || '' }}

      # JDK for the Gradle/Tauri Android build (Linux runner only).
      - uses: actions/setup-java@v4
        if: matrix.android
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux deps for Tauri / xcap / cpal
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libpipewire-0.3-dev \
            libasound2-dev \
            libgbm-dev \
            libsecret-1-dev \
            patchelf

      # Single workspace rooted at the repo root: all six crates build into the
      # shared ./target, so cache that one dir. Pointing at member subdirs caches
      # only the registry (their target/ dirs do not exist), leaving the whole
      # dependency graph to recompile every run.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          shared-key: release-${{ matrix.id }}
          cache-all-crates: true

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock', '**/deno.json', '**/deno.jsonc') }}
          restore-keys: |
            deno-${{ runner.os }}-

      # win-arm64 only: workerd (a website-only workspace dep) ships no arm64
      # Windows binary, and its npm lifecycle script aborts with "Unsupported
      # platform: win32 arm64". With nodeModulesDir "auto", deno runs allowScripts
      # lifecycle scripts while setting up the workspace node_modules, which the
      # very first `deno task release:ci-build` triggers - BEFORE build-client.ts
      # (its in-graph strip) can run. So drop workerd from allowScripts here,
      # before any deno command. deno.json is JSONC, so the trailing comma left on
      # the previous entry is fine. This checkout is ephemeral; nothing is committed.
      - name: Drop workerd from allowScripts (win-arm64)
        if: matrix.id == 'windows-arm64'
        shell: bash
        run: |
          grep -v 'npm:workerd@' deno.json > deno.json.tmp
          mv deno.json.tmp deno.json

      # sherpa-onnx-sys's prebuilt download map omits win-arm64, so stage the
      # upstream win-arm64 static lib and point SHERPA_ONNX_LIB_DIR at it (the CI
      # counterpart to windows-provision.ps1's guest setup). The version pin must
      # match sherpa-onnx in packages/tomat-core-speech/Cargo.toml.
      - name: Stage sherpa-onnx win-arm64 lib (win-arm64)
        if: matrix.id == 'windows-arm64'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $SherpaVersion = "1.13.2"
          $Name = "sherpa-onnx-v$SherpaVersion-win-arm64-static-MT-Release-lib"
          $Url = "https://github.com/k2-fsa/sherpa-onnx/releases/download/v$SherpaVersion/$Name.tar.bz2"
          $Root = Join-Path $env:RUNNER_TEMP "sherpa-onnx-libs"
          New-Item -ItemType Directory -Force -Path $Root | Out-Null
          $archive = Join-Path $Root "$Name.tar.bz2"
          Write-Host "downloading $Url"
          Invoke-WebRequest -Uri $Url -OutFile $archive
          & "$env:SystemRoot\System32\tar.exe" -xf $archive -C $Root
          $lib = Get-ChildItem -Recurse -Path $Root -Filter "sherpa-onnx-core.lib" | Select-Object -First 1
          if (-not $lib) { throw "sherpa-onnx-core.lib not found under $Root" }
          "SHERPA_ONNX_LIB_DIR=$($lib.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "SHERPA_ONNX_LIB_DIR = $($lib.DirectoryName)"

      - name: Build + stage (${{ matrix.id }})
        shell: bash
        env:
          # Public key is baked into the core binary; the Tauri minisign key signs
          # the desktop bundle; the Android keystore signs the APK. The Ed25519
          # PRIVATE manifest key is deliberately NOT provided to build runners.
          TOMAT_SIGNING_PUBLIC_KEY_B64: ${{ secrets.TOMAT_SIGNING_PUBLIC_KEY_B64 }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_UPDATER_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_UPDATER_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY_PASSWORD }}
          TOMAT_ANDROID_KEYSTORE_B64: ${{ secrets.TOMAT_ANDROID_KEYSTORE_B64 }}
          TOMAT_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.TOMAT_ANDROID_KEYSTORE_PASSWORD }}
          TOMAT_ANDROID_KEY_ALIAS: ${{ secrets.TOMAT_ANDROID_KEY_ALIAS }}
          TOMAT_ANDROID_KEY_PASSWORD: ${{ secrets.TOMAT_ANDROID_KEY_PASSWORD }}
          # Apple signing + App Store Connect (macOS client signing and the iOS
          # .ipa build/upload). Empty until the account exists, so both stay inert.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
        run: |
          # NDK for the Tauri Android build (Linux runner only). The runner sets
          # ANDROID_NDK_LATEST_HOME in its shell env; surface it under the names
          # Tauri/Gradle read.
          if [ -n "${{ matrix.android }}" ]; then
            export NDK_HOME="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"
            export ANDROID_NDK_HOME="$NDK_HOME"
          fi
          deno task release:ci-build \
            --channel=${{ steps.ch.outputs.channel }} \
            ${{ matrix.android && '--android' || '' }} \
            ${{ (matrix.ios && vars.IOS_ENABLED == 'true') && '--ios' || '' }}

      - uses: actions/upload-artifact@v4
        with:
          name: stage-${{ matrix.id }}
          path: stage
          retention-days: 3
          if-no-files-found: error

  # The single coordinator: collect every runner's stage dir, reconstruct dist/,
  # compose + sign + upload the unified manifests to R2, write the shared cursor,
  # and mirror the run to the rolling per-channel GitHub Release.
  publish:
    name: "Publish + GitHub Release"
    needs: [preflight, build]
    if: needs.preflight.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Channel from branch
        id: ch
        run: echo "channel=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.8.x

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock', '**/deno.json', '**/deno.jsonc') }}
          restore-keys: |
            deno-${{ runner.os }}-

      # All build artifacts, each under staging/stage-<id>/.
      - uses: actions/download-artifact@v4
        with:
          path: staging
          pattern: stage-*

      # The publish half reads R2 + signing creds from .env (loadOrSeedEnv). Only
      # single-line secrets land here; the multi-line Tauri key is build-only.
      # Secrets pass through env (masked in logs), not the script body.
      - name: Write .env from secrets
        env:
          TOMAT_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TOMAT_SIGNING_PRIVATE_KEY_B64 }}
          TOMAT_SIGNING_PUBLIC_KEY_B64: ${{ secrets.TOMAT_SIGNING_PUBLIC_KEY_B64 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TOMAT_R2_BUCKET: ${{ secrets.TOMAT_R2_BUCKET }}
          TOMAT_STORAGE_DOMAIN: ${{ secrets.TOMAT_STORAGE_DOMAIN }}
        run: |
          {
            echo "TOMAT_SIGNING_PRIVATE_KEY_B64=$TOMAT_SIGNING_PRIVATE_KEY_B64"
            echo "TOMAT_SIGNING_PUBLIC_KEY_B64=$TOMAT_SIGNING_PUBLIC_KEY_B64"
            echo "CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID"
            echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN"
            echo "TOMAT_R2_BUCKET=$TOMAT_R2_BUCKET"
            echo "TOMAT_STORAGE_DOMAIN=$TOMAT_STORAGE_DOMAIN"
          } > .env

      - name: Publish to R2 + GitHub Release
        env:
          # gh (the GitHub Release mirror) + the stable-channel upstream resolver.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          deno task release:ci-publish \
            --channel=${{ steps.ch.outputs.channel }} \
            --yes \
            --staging-root=staging

  # Post-publish bump: advance the just-published items' version files, commit
  # them to `main`, record the post-bump source hash in the shared R2 cursor, and
  # fast-forward `latest` onto the bump commit (the committed counterpart to a
  # local release's auto-bump). Latest channel only; the resulting `latest` push
  # re-triggers this workflow but preflight then sees the cursor current and skips
  # everything, so it terminates in one cheap extra run.
  bump:
    name: "Bump versions on main"
    needs: [preflight, publish]
    if: needs.preflight.outputs.changed == 'true' && github.ref_name == 'latest'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Full history + write token so the bump can commit on main and move latest.
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.8.x

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock', '**/deno.json', '**/deno.jsonc') }}
          restore-keys: |
            deno-${{ runner.os }}-

      # Same .env the publish half uses: loadOrSeedEnv wants the R2 + signing keys
      # to read + write the shared release-state cursor.
      - name: Write .env from secrets
        env:
          TOMAT_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TOMAT_SIGNING_PRIVATE_KEY_B64 }}
          TOMAT_SIGNING_PUBLIC_KEY_B64: ${{ secrets.TOMAT_SIGNING_PUBLIC_KEY_B64 }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TOMAT_R2_BUCKET: ${{ secrets.TOMAT_R2_BUCKET }}
          TOMAT_STORAGE_DOMAIN: ${{ secrets.TOMAT_STORAGE_DOMAIN }}
        run: |
          {
            echo "TOMAT_SIGNING_PRIVATE_KEY_B64=$TOMAT_SIGNING_PRIVATE_KEY_B64"
            echo "TOMAT_SIGNING_PUBLIC_KEY_B64=$TOMAT_SIGNING_PUBLIC_KEY_B64"
            echo "CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID"
            echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN"
            echo "TOMAT_R2_BUCKET=$TOMAT_R2_BUCKET"
            echo "TOMAT_STORAGE_DOMAIN=$TOMAT_STORAGE_DOMAIN"
          } > .env

      - name: Configure git identity
        run: |
          git config user.name "tomat-release[bot]"
          git config user.email "tomat-release[bot]@users.noreply.github.com"

      - name: Bump versions, commit to main, fast-forward latest
        run: deno task release:ci-bump --channel=${{ github.ref_name }}
