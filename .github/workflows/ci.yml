name: CI

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # TypeScript pipeline: type-check + svelte-check (deno task check), format check
  # (fmt:check), and JS/Svelte lint (lint:js = oxlint + the custom walkers), then
  # the deno + vitest tests (test:js). The run steps delegate to the `deno task`
  # targets so CI can't drift from the canonical command lists. Rust
  # compile-checking (clippy, a superset of cargo check) and the cargo test suite
  # live in the `rs` matrix below and run in parallel with this job; this job
  # stays TS-only and light. Its only cargo touches are `cargo fmt --check` (which
  # does not compile) and the tiny ptyhost binary the permission-prompt live probe
  # needs - neither needs the Tauri/webkit system libs.
  deno:
    name: "TypeScript checks (linux)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.x

      # Fail fast if the committed deno.lock no longer matches what the manifests
      # resolve to: the signed core binary is built from this graph, so a drifted
      # lock must never pass CI green.
      - name: Verify frozen deno lockfile
        run: deno install --frozen

      # Toolchain for `cargo fmt --check` (no compile) and the small ptyhost build
      # below; the heavy Rust compile lives in the `rs` matrix.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.96.1
          components: rustfmt

      # All Rust crates are members of the single workspace rooted at the repo
      # root, so every build lands in the shared ./target. rust-cache must point at
      # that root (not a member subdir, which has no target/ and so caches nothing
      # but the registry).
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target
          cache-all-crates: true

      # Cache Deno's module + npm cache between runs.
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock', '**/deno.json', '**/deno.jsonc') }}
          restore-keys: |
            deno-${{ runner.os }}-

      - run: deno task check
      - run: deno task fmt:check
      - run: deno task lint:js

      # The permission-prompt live probe (extensions/prompt-live-probe.test.ts)
      # needs the real ptyhost binary; build it first and force the test to FAIL
      # rather than skip if the binary is somehow absent, since it is the drift
      # tripwire for deno version bumps.
      - run: cargo build -p tomat-core-ptyhost

      # In-source TS tests, split one step per package so a hang localizes to a
      # single step in the log: the aggregate `deno task test:js` fans out through
      # scripts/pkg.ts, which buffers each package's output until it completes and
      # so hides which package stalled. Each step carries its own short timeout so
      # a hang fails fast on the offending package instead of burning the whole
      # job budget. The cargo test suite runs in the `rs` matrix; E2E (WebdriverIO
      # + tauri-driver under tests/e2e/) is not run in CI (see tests/e2e/README.md).
      - name: "test:js (shared)"
        run: deno task --cwd packages/tomat-shared test:js
        timeout-minutes: 3
      - name: "test:js (core-engine)"
        run: deno task --cwd packages/tomat-core-engine test:js
        timeout-minutes: 3
      # TOMAT_REQUIRE_PTYHOST makes the prompt-live-probe (the deno-bump drift
      # tripwire) fail rather than skip; it lives in core and uses the binary built
      # above.
      - name: "test:js (core)"
        run: deno task --cwd packages/tomat-core test:js
        timeout-minutes: 3
        env:
          TOMAT_REQUIRE_PTYHOST: "1"
      - name: "test:js (client)"
        run: deno task --cwd packages/tomat-client test:js
        timeout-minutes: 3
      - name: "test:js (extension-builtin)"
        run: deno task --cwd packages/tomat-extension-builtin test:js
        timeout-minutes: 3
      - name: "test:js (extension-samples)"
        run: deno task --cwd packages/tomat-extension-samples test:js
        timeout-minutes: 3

  # Rust pipeline: clippy (the single Rust compile-check - `--all-targets` is a
  # superset of cargo check, so check is never run separately) plus the cargo test
  # suite. The shipping crates (the Tauri shell, core-keychain, core-updater,
  # core-ptyhost) run on every supported host so their platform-specific cfgs stay
  # buildable; the core-hwinfo and core-speech helpers are Linux-only checks. Runs
  # in parallel with the TS job above, Linux included.
  rs:
    name: "Rust checks (${{ matrix.os }})"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.96.1
          components: clippy
      # Tauri / xcap / cpal need the webkit + PipeWire/ALSA system libs on Linux;
      # macOS and Windows use the system webview and need nothing extra.
      - name: Install Linux deps for Tauri / xcap / cpal
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libpipewire-0.3-dev \
            libasound2-dev \
            libgbm-dev \
            patchelf
      # Single workspace rooted at the repo root: all six crates build into the
      # shared ./target, so cache that one dir. Pointing at member subdirs caches
      # only the registry (their target/ dirs do not exist), leaving the whole
      # dependency graph to recompile every run.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target
          shared-key: rs-${{ matrix.os }}
          cache-all-crates: true
      # --locked fails if any Cargo.lock would change, so a drifted lock can't
      # pass CI (the signed helper binaries are built from these locks).
      - run: cargo clippy --locked --manifest-path packages/tomat-client/src/tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --locked --manifest-path packages/tomat-client/src/tauri/Cargo.toml --lib
      - run: cargo clippy --locked --manifest-path packages/tomat-core-keychain/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --locked --manifest-path packages/tomat-core-keychain/Cargo.toml
      - run: cargo clippy --locked --manifest-path packages/tomat-core-updater/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --locked --manifest-path packages/tomat-core-updater/Cargo.toml
      - run: cargo clippy --locked --manifest-path packages/tomat-core-ptyhost/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --locked --manifest-path packages/tomat-core-ptyhost/Cargo.toml
      # core-hwinfo and core-speech are Linux-only checks (they were previously
      # covered on Linux only, inside the old monolithic job).
      - run: cargo clippy --locked --manifest-path packages/tomat-core-hwinfo/Cargo.toml --all-targets -- -D warnings
        if: runner.os == 'Linux'
      - run: cargo test --locked --manifest-path packages/tomat-core-hwinfo/Cargo.toml
        if: runner.os == 'Linux'
      - run: cargo clippy --locked --manifest-path packages/tomat-core-speech/Cargo.toml --all-targets -- -D warnings
        if: runner.os == 'Linux'
      - run: cargo test --locked --manifest-path packages/tomat-core-speech/Cargo.toml
        if: runner.os == 'Linux'

  # Android build check. The Tauri shell's mobile cfg (#[cfg(mobile)] /
  # target_os = "android") is never exercised by the host-target checks above, and
  # neither is the android gradle/Kotlin toolchain: a Rust-only `cargo check`
  # misses a Kotlin metadata mismatch (e.g. an androidx lib compiled with Kotlin
  # 2.1 under a 1.9 compiler), which only surfaces during the gradle Kotlin
  # compile. So run a real `tauri android build` here: it compiles the Rust mobile
  # cfg AND runs the gradle assemble, catching both classes of breakage on main
  # (the wry-generated Kotlin is produced by the Rust build, so a gradle-only step
  # is not possible). Scoped to one ABI + the debug variant to stay lean - the
  # Kotlin compile is ABI- and variant-independent, so this still catches the
  # mismatch. ubuntu-latest ships the Android SDK + NDK; debug signing needs no
  # keystore secret. Guards the Renovate coupling in renovate.json.
  android:
    name: "Android build (gradle assemble)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9.x
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.96.1
          targets: aarch64-linux-android
      # Parity with the release android runner: the same host libs are present
      # where this build is known to work, so install them to avoid a spurious
      # missing-lib failure masking the real (Kotlin) signal.
      - name: Install Linux deps for Tauri / xcap / cpal
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libpipewire-0.3-dev \
            libasound2-dev \
            libgbm-dev \
            patchelf
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target
          key: android
          cache-all-crates: true
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock', '**/deno.json', '**/deno.jsonc') }}
          restore-keys: |
            deno-${{ runner.os }}-
      # Single ABI + debug: compiles the Rust android cfg, generates the wry Kotlin,
      # and runs the gradle Kotlin compile (where a metadata mismatch fails).
      - name: Android APK build (aarch64, debug)
        working-directory: packages/tomat-client
        run: |
          export NDK_HOME="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"
          export ANDROID_NDK_HOME="$NDK_HOME"
          deno run -A npm:@tauri-apps/cli@^2 android build --apk --debug --target aarch64

  # iOS cross-compile check. Same rationale as the android job: the shell's mobile
  # cfg (#[cfg(mobile)] / target_os = "ios") is only exercised on an Apple target,
  # so compile it for the device ABI here. Needs a macOS runner (xcodebuild is
  # preinstalled); no signing, since this is a compile-only check. Dormant until
  # the IOS_ENABLED repo variable is set (with the Apple account), so it consumes
  # no macOS runner minutes and cannot block PRs before iOS work is active.
  ios:
    name: "iOS cross-compile check"
    if: ${{ vars.IOS_ENABLED == 'true' }}
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.96.1
          targets: aarch64-apple-ios
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target
          key: ios
          cache-all-crates: true
      - name: iOS cargo check (aarch64-apple-ios)
        run: |
          cargo check --locked \
            --manifest-path packages/tomat-client/src/tauri/Cargo.toml \
            --target aarch64-apple-ios
