name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: JS / Svelte
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - run: bun run check:js

  rs:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            exe_ext: ""
          - os: macos-latest
            triple: aarch64-apple-darwin
            exe_ext: ""
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            exe_ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      # Linux system deps for Tauri/webkit and xcap (PipeWire screen capture)
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libpipewire-0.3-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      # tauri-build validates externalBin paths exist for the current target.
      # Real binaries come from `bun run fetch` but aren't needed for cargo check;
      # create empty placeholders so the build script doesn't fail.
      - name: Create placeholder sidecar binaries
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          for bin in tomat-tools-server tomat-llama-server tomat-whisper-server; do
            touch "src-tauri/binaries/${bin}-${{ matrix.triple }}${{ matrix.exe_ext }}"
          done
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets
