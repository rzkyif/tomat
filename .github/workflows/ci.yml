name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # All Deno-driven checks (type-check, svelte-check, cargo check on Linux,
  # format check, lint, clippy, tests). The run steps delegate straight to the
  # `deno task` targets in deno.json so CI can't drift from the canonical
  # command lists. Single job because deno task check already drives the full
  # pipeline and we don't want a second worker to repeat the npm/JSR resolution.
  deno:
    name: "Rust and Typescript checks (linux)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.8.x

      # Fail fast if the committed deno.lock no longer matches what the manifests
      # resolve to: the signed core binary is built from this graph, so a drifted
      # lock must never pass CI green.
      - name: Verify frozen deno lockfile
        run: deno install --frozen

      # Cargo check (part of `deno task check`) needs the Tauri/webkit and
      # PipeWire/ALSA system libs (the same set the old CI installed for the
      # Rust matrix).
      - name: Install Linux deps for Tauri / xcap / cpal
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libpipewire-0.3-dev \
            libasound2-dev \
            libgbm-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/tomat-client/src/tauri
            packages/tomat-core-keychain
            packages/tomat-core-updater
            packages/tomat-core-ptyhost

      # Cache Deno's module + npm cache between runs.
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock', '**/deno.json', '**/deno.jsonc') }}
          restore-keys: |
            deno-${{ runner.os }}-

      - run: deno task check
      - run: deno task fmt:check
      - run: deno task lint

      # The permission-prompt live probe (toolkits/prompt-live-probe.test.ts)
      # needs the real ptyhost binary; build it first and force the test to
      # FAIL rather than skip if the binary is somehow absent, since it is
      # the drift tripwire for deno version bumps.
      - run: cargo build -p tomat-core-ptyhost

      # In-source tests via `deno task test` (deno + vitest one-shot + cargo).
      # E2E (WebdriverIO + tauri-driver under tests/e2e/) is intentionally not
      # run in CI. See tests/e2e/README.md.
      - run: deno task test
        env:
          TOMAT_REQUIRE_PTYHOST: "1"

  # Cross-platform Rust checks. Linux already runs inside `deno task check`
  # above; this matrix covers macOS + Windows so the Rust crates (the Tauri
  # shell, the core-keychain helper, and the core-updater helper) stay
  # buildable on every supported host without the rest of the Deno pipeline.
  rs:
    name: "Rust checks (${{ matrix.os }})"
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/tomat-client/src/tauri
            packages/tomat-core-keychain
            packages/tomat-core-updater
            packages/tomat-core-ptyhost
      # --locked fails if any Cargo.lock would change, so a drifted lock can't
      # pass CI (the signed helper binaries are built from these locks).
      - run: cargo clippy --locked --manifest-path packages/tomat-client/src/tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo check --locked --manifest-path packages/tomat-client/src/tauri/Cargo.toml --all-targets
      - run: cargo test --locked --manifest-path packages/tomat-client/src/tauri/Cargo.toml --lib
      - run: cargo clippy --locked --manifest-path packages/tomat-core-keychain/Cargo.toml --all-targets -- -D warnings
      - run: cargo check --locked --manifest-path packages/tomat-core-keychain/Cargo.toml --all-targets
      - run: cargo test --locked --manifest-path packages/tomat-core-keychain/Cargo.toml
      - run: cargo clippy --locked --manifest-path packages/tomat-core-updater/Cargo.toml --all-targets -- -D warnings
      - run: cargo check --locked --manifest-path packages/tomat-core-updater/Cargo.toml --all-targets
      - run: cargo test --locked --manifest-path packages/tomat-core-updater/Cargo.toml
      - run: cargo clippy --locked --manifest-path packages/tomat-core-ptyhost/Cargo.toml --all-targets -- -D warnings
      - run: cargo check --locked --manifest-path packages/tomat-core-ptyhost/Cargo.toml --all-targets
      - run: cargo test --locked --manifest-path packages/tomat-core-ptyhost/Cargo.toml
