name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # All Deno-driven checks (type-check, svelte-check, cargo check on Linux,
  # format check, lint, clippy). Single job because deno task check already
  # drives the full pipeline and we don't want a second worker to repeat the
  # npm/JSR resolution.
  deno:
    name: Deno (check + fmt + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Cargo check (part of `deno task check`) needs the Tauri/webkit and
      # PipeWire/ALSA system libs — same set the old CI installed for the
      # Rust matrix.
      - name: Install Linux deps for Tauri / xcap / cpal
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libpipewire-0.3-dev \
            libasound2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.1
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/tomat-client/src/tauri
            packages/tomat-core-keychain

      # Cache Deno's module + npm cache between runs.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock', '**/deno.json', '**/deno.jsonc') }}
          restore-keys: |
            deno-${{ runner.os }}-

      - run: deno task check
      - run: deno fmt --check
      - run: deno run -A npm:oxfmt@0.51.0 --check packages/tomat-client/src/ui packages/tomat-client/vite.config.ts packages/tomat-client/svelte.config.js packages/tomat-client/uno.config.ts packages/tomat-website/src packages/tomat-website/astro.config.mjs
      - run: cargo fmt --manifest-path packages/tomat-client/src/tauri/Cargo.toml --check
      - run: cargo fmt --manifest-path packages/tomat-core-keychain/Cargo.toml --check
      - run: deno task lint

  # Cross-platform Rust checks. Linux already runs inside `deno task check`
  # above; this matrix covers macOS + Windows so the Rust crates (the Tauri
  # shell and the core-keychain helper) stay buildable on every supported host
  # without the rest of the Deno pipeline.
  rs:
    name: Cargo check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.1
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/tomat-client/src/tauri
            packages/tomat-core-keychain
      - run: cargo clippy --manifest-path packages/tomat-client/src/tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo check --manifest-path packages/tomat-client/src/tauri/Cargo.toml --all-targets
      - run: cargo clippy --manifest-path packages/tomat-core-keychain/Cargo.toml --all-targets -- -D warnings
      - run: cargo check --manifest-path packages/tomat-core-keychain/Cargo.toml --all-targets
