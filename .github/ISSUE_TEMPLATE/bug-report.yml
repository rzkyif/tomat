name: Bug report
description: Something is not working as expected.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for testing tomat. Before filing, please note:

        - Security vulnerabilities must not be reported here. Use the private process in [SECURITY.md](https://github.com/rzkyif/tomat/blob/main/SECURITY.md).
        - Search existing issues first. A comment on an existing report helps more than a duplicate.
        - Reports are read as they arrive. A fix may not follow on a fixed schedule.
  - type: input
    id: section
    attributes:
      label: Affected section
      description: Which part of the app does this happen in?
      placeholder: "e.g. Settings > Models panel, chat input, push-to-talk"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: The minimal sequence that triggers the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: What happened instead.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tomat version / commit
      description: "Find it in Settings > About, or run `git rev-parse --short HEAD` if running from source."
      placeholder: "e.g. 0.1.0 or commit 5b849a2"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (ARM64)
        - Windows (x86_64)
        - Windows (ARM64)
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Optional. Screenshots, relevant logs (redact API keys), or workarounds you tried.
