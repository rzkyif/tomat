name: 🐛 Bug report
description: Something isn't working as expected.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping test tomat! A few things to know before filing:

        - Tomat is in a rapid-development phase. Bug issues may sit open for a while — they're being read, but not necessarily fixed on a schedule.
        - **Security vulnerabilities do not go here.** Report them privately via [SECURITY.md](https://github.com/rzkyif/tomat/blob/main/SECURITY.md).
        - Search existing issues first — a comment on a duplicate helps more than a new thread.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
      placeholder: When I click X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: A minimal sequence that triggers the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Tomat version / commit
      description: Find it in Settings → About, or `git rev-parse --short HEAD` if running from source.
      placeholder: "e.g. 0.1.0 or commit 5b849a2"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (ARM64)
        - Windows (x86_64)
        - Windows (ARM64)
    validations:
      required: true
  - type: dropdown
    id: llm-preset
    attributes:
      label: LLM preset in use
      options:
        - Local (llama.cpp)
        - External (OpenAI-compatible)
        - Not relevant / unsure
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Sidecar or devtools console output, if any. Redact API keys.
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, similar reports, workarounds tried.
